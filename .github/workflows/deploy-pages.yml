# Deploy the Next.js static export to the `gh-pages` branch (classic GitHub Pages).
#
# API URL (required — otherwise the SPA calls localhost and sign-in fails on github.io):
#   • Repo → Settings → Secrets and variables → Actions → Variables →
#     Name: PUBLIC_API_BASE_URL   Value: https://your-api.example.com  (no trailing slash, must be HTTPS if Pages is HTTPS)
#   • Or: Actions → Deploy (GitHub Pages) → Run workflow → fill "Public API base URL".
#
# One-time Pages setup:
#   1) Settings → Pages → Source: Deploy from a branch → Branch: gh-pages / (root)
#   2) Push main or run this workflow. Free plan: repo must be public for Pages.
#
# Optional: PAGES_BASE_PATH to override Next basePath.

name: Deploy (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      public_api_base_url:
        description: "API origin for this build only (https://host, no trailing slash). Overrides empty variable."
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve Next.js base path (for GitHub Pages URL)
        id: pages
        env:
          OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "base_path=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          R="${{ github.event.repository.name }}"
          case "$R" in
            *.github.io) echo "base_path=" >> "$GITHUB_OUTPUT" ;;
            *) echo "base_path=/$R" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Resolve PUBLIC_API_BASE_URL for build
        id: api
        env:
          MANUAL: ${{ inputs.public_api_base_url }}
          VAR: ${{ vars.PUBLIC_API_BASE_URL }}
        run: |
          pick=""
          if [ -n "$MANUAL" ]; then pick="$MANUAL"
          elif [ -n "$VAR" ]; then pick="$VAR"
          fi
          pick="${pick%/}"
          if [ -z "$pick" ]; then
            echo "base=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "base=$pick" >> "$GITHUB_OUTPUT"

      - name: Require live API URL (Pages cannot call localhost)
        if: ${{ steps.api.outputs.base == '' }}
        run: |
          echo "::error::Set repository variable PUBLIC_API_BASE_URL (Settings → Secrets and variables → Actions → Variables), or re-run this workflow via 'Run workflow' and enter public_api_base_url. Use your public FastAPI HTTPS origin, e.g. https://xxx.onrender.com — no trailing slash."
          exit 1

      - name: Verify API is live (CI backend job does not deploy Render)
        env:
          BASE: ${{ steps.api.outputs.base }}
        run: |
          set +e
          code=$(curl -sS -D /tmp/api_probe.hdr -o /tmp/api_probe.body -w "%{http_code}" --max-time 30 "${BASE}/api/health")
          err=$?
          set -e
          if [ "$err" != "0" ]; then
            echo "::error::Could not reach ${BASE}/api/health (curl exit $err). Check network, firewall, or wrong URL."
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::GET ${BASE}/api/health → HTTP $code (expected 200). Pages would ship a build that cannot sign in."
            echo "--- response headers ---"
            sed -n '1,25p' /tmp/api_probe.hdr
            echo "--- body (truncated) ---"
            head -c 600 /tmp/api_probe.body || true
            echo ""
            echo "Reminder: the **CI** workflow only runs pytest. It does **not** deploy the API to Render."
            echo "Create or resume a **Web Service** on Render (see Render dashboard), use start: uvicorn app.main:app --host 0.0.0.0 --port \$PORT from directory backend-ai, then set PUBLIC_API_BASE_URL to the URL Render shows."
            if grep -qi 'x-render-routing: no-server' /tmp/api_probe.hdr 2>/dev/null; then
              echo ""
              echo "Render returned x-render-routing: no-server — there is no web service bound to this hostname. Fix the URL or deploy the service."
            fi
            exit 1
          fi
          echo "OK: API health check passed for ${BASE}"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build (static export)
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_API_BASE: ${{ steps.api.outputs.base }}
        run: |
          npm ci
          npm run build

      - name: Verify static export output
        run: |
          if [[ ! -f frontend/out/index.html ]]; then
            echo "Expected frontend/out/index.html after STATIC_EXPORT=true build."
            ls -la frontend/out 2>&1 || ls -la frontend
            exit 1
          fi

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          force_orphan: true
