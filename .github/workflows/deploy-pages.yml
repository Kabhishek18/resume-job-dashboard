# Deploy the Next.js static export to the `gh-pages` branch (classic GitHub Pages).
# This avoids actions/deploy-pages, which returns 404 if the "Actions" Pages backend
# is not available for your repo (common on free private repos or misconfigured sites).
#
# One-time setup:
#   1) Repo → Settings → Pages → Build and deployment → Source: **Deploy from a branch**
#   2) Branch: **gh-pages** · Folder: **/ (root)** → Save
#   3) Run this workflow (or push to main). The `gh-pages` branch is created automatically.
#
# Free GitHub: Pages for a **private** repository is not available — use a **public** repo,
# upgrade the plan, or host the frontend on Vercel/Netlify instead.
#
# Site URL: Settings → Pages (e.g. https://<user>.github.io/<repo>/)
#
# Optional: Actions → Variables → PUBLIC_API_BASE_URL (FastAPI, no trailing slash).
#           PAGES_BASE_PATH to override Next basePath if needed.

name: Deploy (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve Next.js base path (for GitHub Pages URL)
        id: pages
        env:
          OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "base_path=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          R="${{ github.event.repository.name }}"
          case "$R" in
            *.github.io) echo "base_path=" >> "$GITHUB_OUTPUT" ;;
            *) echo "base_path=/$R" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Reminder — API base URL
        if: ${{ vars.PUBLIC_API_BASE_URL == '' }}
        run: |
          echo "::warning::Set Actions variable PUBLIC_API_BASE_URL to your FastAPI origin (no trailing slash), or the SPA will fall back to http://localhost:8000."

      - name: Install and build (static export)
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Verify static export output
        run: |
          if [[ ! -f frontend/out/index.html ]]; then
            echo "Expected frontend/out/index.html after STATIC_EXPORT=true build."
            ls -la frontend/out 2>&1 || ls -la frontend
            exit 1
          fi

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          force_orphan: true
