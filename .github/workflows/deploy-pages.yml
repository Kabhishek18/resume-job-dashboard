# Deploy the Next.js frontend as static HTML/CSS/JS to GitHub Pages.
#
# If deploy fails with: "Failed to create deployment (status: 404)" or HttpError Not Found:
#
#   1) Enable Pages + Actions (required)
#      Repo → Settings → Pages → Build and deployment → Source: **GitHub Actions** → Save.
#      https://github.com/<owner>/<repo>/settings/pages
#
#   2) Free GitHub + *private* repo
#      GitHub Pages does not publish private repos on the free plan. Fix one of:
#      - Settings → General → Danger zone → Change repository visibility → **Public**, OR
#      - Use GitHub Pro/Team/Enterprise for private Pages, OR
#      - Host the static site elsewhere (Vercel, Netlify, Cloudflare Pages).
#
#   3) Re-run this workflow after changing Pages settings or visibility.
#
# Optional: Actions → Variables → PUBLIC_API_BASE_URL (FastAPI origin, no trailing slash).
#           PAGES_BASE_PATH to override subpath (e.g. "" for user.github.io root).

name: Deploy (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Avoid actions/configure-pages: it hits the Pages API and 404s until Pages is enabled (Settings).
      - name: Resolve Next.js base path (for GitHub Pages URL)
        id: pages
        env:
          OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "base_path=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          R="${{ github.event.repository.name }}"
          case "$R" in
            *.github.io) echo "base_path=" >> "$GITHUB_OUTPUT" ;;
            *) echo "base_path=/$R" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Reminder — API base URL
        if: ${{ vars.PUBLIC_API_BASE_URL == '' }}
        run: |
          echo "::warning::Set Actions variable PUBLIC_API_BASE_URL to your FastAPI origin (no trailing slash), or the SPA will fall back to http://localhost:8000."

      - name: Install and build (static export)
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Verify static export output
        run: |
          if [[ ! -f frontend/out/index.html ]]; then
            echo "Expected frontend/out/index.html after STATIC_EXPORT=true build."
            echo "Ensure next.config enables output export when STATIC_EXPORT is set, then push again."
            ls -la frontend/out 2>&1 || ls -la frontend
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
