# Deploy the Next.js frontend as static HTML/CSS/JS to GitHub Pages.
#
# Setup (once per repo):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions.
#   2. Settings → Secrets and variables → Actions → Variables:
#        PUBLIC_API_BASE_URL = https://your-api.example.com   (no trailing slash)
#      Optionally override the subpath with PAGES_BASE_PATH (e.g. "" for a user site).
#
# FastAPI is not hosted by GitHub Pages; run the backend on Render/Railway/Fly/etc.
# Set CORS on the API to include your Pages origin, e.g. https://<user>.github.io

name: Deploy (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Recommended before upload-pages-artifact; gathers Pages metadata (does not patch our Next config).
      - name: Setup Pages
        id: pages_meta
        uses: actions/configure-pages@v5

      - name: Resolve Pages base path
        id: pages
        env:
          OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
          DETECTED: ${{ steps.pages_meta.outputs.base_path }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "base_path=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=$DETECTED" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Reminder — API base URL
        if: ${{ vars.PUBLIC_API_BASE_URL == '' }}
        run: |
          echo "::warning::Set Actions variable PUBLIC_API_BASE_URL to your FastAPI origin (no trailing slash), or the SPA will fall back to http://localhost:8000."

      - name: Install and build (static export)
        working-directory: frontend
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Verify static export output
        run: |
          if [[ ! -f frontend/out/index.html ]]; then
            echo "Expected frontend/out/index.html after STATIC_EXPORT=true build."
            echo "Ensure next.config enables output export when STATIC_EXPORT is set, then push again."
            ls -la frontend/out 2>&1 || ls -la frontend
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
